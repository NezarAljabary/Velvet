<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velvet Quick Add</title>
    <link rel="stylesheet" href="./design-system.css" />
    <link rel="stylesheet" href="./quick-add.css" />
  </head>
  <body class="qa-root">
    <main class="qa-card" role="dialog" aria-modal="true" aria-labelledby="qaTitle">
      <header class="qa-header">
        <p class="qa-eyebrow">Velvet Quick Add</p>
        <h1 id="qaTitle">Create a task from one line</h1>
        <p class="qa-helper">Examples: <code>Finish report tomorrow 5pm high</code> or <code>Call dentist Friday 14:30</code></p>
      </header>

      <label class="qa-label" for="qaInput">Task line</label>
      <input
        id="qaInput"
        class="app-input qa-input"
        type="text"
        maxlength="220"
        placeholder="Type task details and press Enter"
        autocomplete="off"
      />

      <section class="qa-preview-region" aria-live="polite">
        <div id="qaPreview" class="qa-preview"></div>
      </section>

      <footer class="qa-footer">
        <p id="qaStatus" class="qa-status">Enter to save | Esc to close</p>
        <p class="qa-shortcuts"><kbd>Enter</kbd> Save <kbd>Esc</kbd> Close</p>
      </footer>
    </main>
    <script src="./quick-add.js"></script>
  </body>
</html>
