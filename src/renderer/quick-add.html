<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velvet Quick Add</title>
    <link rel="stylesheet" href="./design-system.css" />
    <link rel="stylesheet" href="./quick-add.css" />
  </head>
  <body class="quick-add-window">
    <main class="quick-add-shell">
      <section class="quick-add-panel app-modal" role="dialog" aria-modal="true" aria-labelledby="quickAddTitle">
        <header class="quick-add-head">
          <p class="eyebrow">Velvet Quick Add</p>
          <h1 id="quickAddTitle">Create a task from one line</h1>
          <p class="quick-add-hint">Examples: <code>Finish report tomorrow 5pm high</code> or <code>Call dentist Friday 14:30</code></p>
        </header>

        <input
          id="quickAddInput"
          class="app-input quick-add-input"
          type="text"
          maxlength="220"
          placeholder="Type task details, press Enter to save..."
          autocomplete="off"
        />

        <div id="quickAddPreview" class="quick-add-preview" aria-live="polite"></div>
        <footer class="quick-add-foot">
          <p id="quickAddStatus" class="sidebar-note">Enter to save | Esc to close</p>
        </footer>
      </section>
    </main>
    <script src="./quick-add.js"></script>
  </body>
</html>
